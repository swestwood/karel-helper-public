<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Karel Helper</title>
    <link rel="shortcut icon" type="image/x-icon" href="./images/favicon.ico">
    <link rel="stylesheet" type="text/css" href="./lib/flexbox.css" />
    <link rel="stylesheet" type="text/css" href="./mixins.css" />
    <link rel="stylesheet" type="text/css" href="./index.css" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-163548501-1"></script>
    <script>
      var host = window.location.hostname;
      if (host == "localhost") {
        window['ga-disable-UA-163548501-1'] = true;
      }
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'UA-163548501-1');
    </script>

    <script src="./lib/umbrella.min.js"></script>
    <script src="./index.min.js"></script>
</head>

<body>
  <div class="header">
    <img class="header-image" height=120 src='./images/planning.svg'/>
    <div class="header-text">
      <div class="page-title">Karel Helper</div>
      <div class="header-description">
        <div>Move Karel around to think through your program.</div>
        <div>Visualize and strategize your coding ideas.</div>
      </div>
    </div>
    <div class="endorsement-quote">
      <div class="open-quote">“</div>
      It's even better than graph paper!
      <div class="close-quote">”</div>
      <div class="dash-quote"></div>
      <div class="endorsement-quote-attribution">Random Section Leader, 2020</div>
    </div>
  </div>
  <div class="content-container">
    <div class="errors"></div>
    <div class="content">
      <div class="sidebar">
        <div class="section-title">Make Karel Do Stuff</div>
        <div class="command-section">
          <div class="controls-section karel-controls">
            <div class="place-karel-button"><img height=30 src='./images/karel.svg'/></div>
            <div class="karel-explanation-wrapper">Click the map to move Karel.</div>
            <!-- <div>Double click to have Karel follow your mouse (click to stop)</div> -->
          </div>
          <button class="button-move">move() <span class="shortcut">f</span></button>
          <button class="button-turn-left">turn_left() <span class="shortcut">d</span></button>
          <div class="extra-turn-buttons">
            <button class="button-turn-right">turn_right() <span class="shortcut">s</span></button>
            <button class="button-turn-around">turn_around() <span class="shortcut">a</span></button>
          </div>
          <button class="button-put-beeper">put_beeper() <span class="shortcut">r</span></button>
          <button class="button-pick-beeper">pick_beeper() <span class="shortcut">e</span></button>
          <div class="controls-section beeper-bag-section">
            <input class="beepers-in-bag-count" type="text" size=8></input>
            <div class="beeper-bag-label">beepers in bag</div>
          </div>
        </div>

        <div class="world-controls">
          <div class="section-title">Change Karel's World</div>
          <div class="controls-section">
            <div class="place-beeper-button"></div>
            <div class="beeper-buttons-wrapper">
              <button class="add-beeper-button">Add beepers</button>
              <button class="remove-beeper-button">Remove</button>
            </div>
          </div>
          <div class="controls-section">
            <div class="place-wall-button"></div>
            <div class="wall-buttons-wrapper">
              <button class="add-wall-button">Add walls</button>
              <button class="remove-wall-button">Remove walls</button>
            </div>
          </div>
          <div class="controls-section">
            <div class="dimensions-input">
              <div class="dimension-input">Rows <input type="text" class="world-height" size=4></input></div>
              <div class="dimension-input">Cols <input type="text" class="world-width" size=4></input></div>
            </div>
            <button class="update-world-size-button">Set dimensions</button>
          </div>
        </div>
      </div>
      <div class="world-wrapper">
        <div class="world">
          <!-- Landscape must be the first child -->
          <div class="landscape"></div>
          <div class="beepers"></div>
          <div class="walls"></div>
          <div class="karel"><img height=50 src='./images/karel.svg'/><div class="karel-arrow"></div></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
